<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Prestaciones</title>
    <link rel="stylesheet" href="../css/calculadora.css" />
  </head>

  <body>
    <header>
      <div class="div-logo">
        <a class="logo" href="../index.html">LOGO</a>
      </div>

      <nav class="header-nav">
        <ul>
          <li><a href="../index.html">Inicio</a></li>
          <li><a href="./prestadores.html">Prestadores</a></li>
          <li><a href="./planes.html">Planes</a></li>
          <li><a href="./calculadora.html">Calculadora</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <h1>Calculadora de Prestaciones</h1>

      <section class="datos">

        <!-- Nomenclador -->
        <div class="campo">
          <label for="nomenclador">Nomenclador</label>
          <input
            type="file"
            id="nomenclador"
            accept=".xlsx,.xls"
          />
        </div>

        <!-- Valores del galeno -->
        <div class="campo">
          <label for="valores">Valores del Galeno</label>
          <input
            type="file"
            id="valores"
            accept=".xlsx,.xls"
          />
        </div>

        <!-- Código -->
        <div class="campo">
          <label for="codigo">Código</label>
          <input type="text" id="codigo" />
        </div>

        <!-- Fecha -->
        <div class="campo">
          <label for="fecha">Fecha</label>
          <input type="date" id="fecha" />
        </div>

        <!-- Botón -->
        <div class="campo">
          <button id="btn-buscar">Buscar</button>
        </div>

        <!-- Descripción -->
        <div class="campo">
          <label for="descripcion">Descripción</label>
          <input
            type="text"
            id="descripcion"
            readonly
          />
        </div>

      </section>

      <section>
        <table border="1">
          <thead>
            <tr>
              <th></th>
              <th>Categoría A</th>
              <th>Categoría B</th>
              <th>Categoría C</th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td>Honorarios</td>
              <td id="honorario-a"></td>
              <td id="honorario-b"></td>
              <td id="honorario-c"></td>
            </tr>

            <tr>
              <td>Gastos</td>
              <td id="gastos-a"></td>
              <td id="gastos-b"></td>
              <td id="gastos-c"></td>
            </tr>

            <tr>
              <td>Ayudantes</td>
              <td id="ayudante-a"></td>
              <td id="ayudante-b"></td>
              <td id="ayudante-c"></td>
            </tr>

            <tr>
              <td>Anestesistas</td>
              <td id="anestesista-a"></td>
              <td id="anestesista-b"></td>
              <td id="anestesista-c"></td>
            </tr>

            <tr>
              <td>Cantidad de ayudantes</td>
              <td id="cant-ayudantes-a"></td>
              <td id="cant-ayudantes-b"></td>
              <td id="cant-ayudantes-c"></td>
            </tr>

            <tr>
              <td>Honorarios + Gastos</td>
              <td id="total-a"></td>
              <td id="total-b"></td>
              <td id="total-c"></td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <footer class="pie-de-pagina">
      <a href="../index.html">Volver al inicio</a>
    </footer>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="../js/calculadora.js"></script>
  </body>
</html>
